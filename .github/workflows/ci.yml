name: CI Pipeline

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ tests/ --max-warnings=0

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  test:
    name: Jest Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test -- --coverage --ci --detectOpenHandles

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false
          files: ./coverage/lcov.info
          flags: unittests

  mutation:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Stryker mutation testing on SignalLifecycleManager
        run: npx stryker run --mutate src/infrastructure/SignalLifecycleManager.ts
        continue-on-error: false

      - name: Upload mutation report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/

  complexity:
    name: Code Complexity Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check cyclomatic complexity
        run: npx eslint src/ --rule 'complexity: [error, 5]' --quiet

      - name: Check max lines per function
        run: npx eslint src/ --rule 'max-lines-per-function: [error, 50]' --quiet

  quality-gates:
    name: Quality Gates Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, mutation, complexity]
    if: always()
    steps:
      - name: Check all quality gates
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ ESLint check failed"
            exit 1
          fi
          if [ "${{ needs.type-check.result }}" != "success" ]; then
            echo "❌ TypeScript type check failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Test suite failed"
            exit 1
          fi
          if [ "${{ needs.mutation.result }}" != "success" ]; then
            echo "❌ Mutation testing failed"
            exit 1
          fi
          if [ "${{ needs.complexity.result }}" != "success" ]; then
            echo "❌ Code complexity audit failed"
            exit 1
          fi
          echo "✅ All quality gates passed"
